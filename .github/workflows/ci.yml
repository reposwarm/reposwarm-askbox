name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/ -v -k "not test_clone_real_repo" --tb=short

      - name: Run integration test (real arch-hub)
        run: python -m pytest tests/test_arch_hub.py::TestClone::test_clone_real_repo -v --tb=short

  changes:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for code changes
        id: filter
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$FILES"
          CODE_CHANGED="false"
          while IFS= read -r file; do
            case "$file" in
              *.md|LICENSE|.gitignore|docs/*) ;;
              *) CODE_CHANGED="true"; break ;;
            esac
          done <<< "$FILES"
          echo "code=$CODE_CHANGED" >> "$GITHUB_OUTPUT"

  docker:
    needs: [test, changes]
    runs-on: ubuntu-latest
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/reposwarm/askbox:latest
            ghcr.io/reposwarm/askbox:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
